env:
  RANDOMEX: "clang-3. clang-4. clang-5. gcc-4. gcc-5. gcc-6. gcc-7. intel-2014 intel-2015 intel-2016 intel-next pgi"
  LIBXSMM_VERBOSE: 4
  CONFIG: "random"
  FORTRAN: 0
  SYM: 2

steps:
  - command: "scripts/tool_test.sh samples/xgemm/kernel_test_dmr.sh"
    env:
      BIN_INSTR_TOOL: "/swtools/sde/latest/sde64 -dmr --"
    label: "SMMs DMR Prec. (DMR)"

  - command: "scripts/tool_test.sh samples/xgemm/kernel_test_ace_f32.sh"
    env:
      LIBXSMM_TARGET: "ace1"
      BIN_INSTR_TOOL: "/swtools/sde/latest/sde64 -future --"
    label: "SMMs BF32 Prec. (ACEv1)"

  - command: "scripts/tool_test.sh samples/xgemm/kernel_test_ace.sh"
    env:
      LIBXSMM_TARGET: "ace1"
      BIN_INSTR_TOOL: "/swtools/sde/latest/sde64 -future --"
    label: "SMMs BF16/FP16/BF8/HF8 Prec. (ACEv1)"

  - command: "scripts/tool_test.sh samples/xgemm/kernel_test_ace_mx.sh"
    env:
      LIBXSMM_TARGET: "ace1"
      BIN_INSTR_TOOL: "/swtools/sde/latest/sde64 -future --"
    label: "SMMs MXBF8/MXHF8/MXBF6/MXHF6/MXFP4 Prec. (ACEv1)"
